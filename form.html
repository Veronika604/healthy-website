<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <title>Анкета | Veronika_health</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
<header class="topbar">
  <div class="logo">Veronika_health</div>
  <div class="nav-buttons">
    <a href="register.html" class="back-btn">Назад</a>
  </div>
</header>

<section class="form fade-in">
  <h2>О вас</h2>

  <input name="height" placeholder="Рост (см)">
  <input name="weight" placeholder="Вес (кг)">

  <select name="activity">
    <option value="low">Низкая активность</option>
    <option value="medium">Средняя активность</option>
    <option value="high">Высокая активность</option>
  </select>

  <select name="goal">
    <option value="lose">Похудеть</option>
    <option value="maintain">Поддерживать вес</option>
    <option value="gain">Набрать вес</option>
  </select>

  <select name="diet">
    <option value="normal">Обычное питание</option>
    <option value="vegan">Веган</option>
    <option value="vegetarian">Вегетарианец</option>
    <option value="pescetarian">Пескетарианец</option>
    <option value="glutenfree">Безглютеновое</option>
    <option value="keto">Кето</option>
  </select>

  <input name="goal_weight" placeholder="Цель веса (кг)">
  <input name="allergies" placeholder="Аллергии / непереносимости">
  <input name="favorite_foods" placeholder="Любимые продукты">

  <a href="menu.html"><button>Сохранить</button></a>
</section>

</body>
</html>
